name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.1.0-beta.65"
        required: true
        type: string
      ref:
        description: "Git ref or commit SHA to build when dispatched manually"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Resolve tag and ref
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            REF="$INPUT_REF"
          else
            TAG="$GITHUB_REF_NAME"
            REF="$GITHUB_SHA_VALUE"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [ "${TAG#v}" = "$TAG" ]; then
            echo "Release tag must start with v: $TAG" >&2
            exit 1
          fi

          if [ -z "$REF" ]; then
            echo "Release ref is required." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Verify Cargo.toml version matches tag
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)

          if [ -z "$VERSION" ]; then
            echo "Could not read Cargo.toml version." >&2
            exit 1
          fi

          if [ "v$VERSION" != "$TAG" ]; then
            echo "Cargo.toml version $VERSION does not match requested tag $TAG." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: codewebway-x86_64-apple-darwin
            use_zigbuild: false
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: codewebway-aarch64-apple-darwin
            use_zigbuild: false
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            asset_name: codewebway-x86_64-unknown-linux-musl
            use_zigbuild: true
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            asset_name: codewebway-aarch64-unknown-linux-musl
            use_zigbuild: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        shell: bash
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p dist

          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

          cp "target/${{ matrix.target }}/release/codewebway" "dist/${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: codewebway-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          target_commitish: ${{ needs.verify.outputs.ref }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/codewebway-aarch64-apple-darwin
            dist/codewebway-aarch64-unknown-linux-musl
            dist/codewebway-x86_64-apple-darwin
            dist/codewebway-x86_64-unknown-linux-musl
