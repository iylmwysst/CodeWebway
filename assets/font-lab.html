<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeWebway Font Lab</title>
  <style>
    :root {
      --lab-font: "Noto Sans", "Noto Sans Thai", system-ui, sans-serif;
      --lab-size: 16px;
      --lab-line: 1.35;
      --lab-letter: 0px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      color: #ddd;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid #333;
      border-radius: 10px;
      background: #161616;
      padding: 12px;
    }
    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    label { font-size: 12px; color: #aaa; display: grid; gap: 6px; }
    input, select, textarea, button {
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      background: #101010;
      color: #eee;
      padding: 8px 10px;
      font-size: 14px;
    }
    button { cursor: pointer; }
    .lab {
      font-family: var(--lab-font);
      font-size: var(--lab-size);
      line-height: var(--lab-line);
      letter-spacing: var(--lab-letter);
      white-space: pre-wrap;
      word-break: break-word;
      padding: 10px;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      background: #0f0f0f;
      min-height: 140px;
    }
    .mono {
      font-family: var(--lab-font);
      font-size: var(--lab-size);
      line-height: var(--lab-line);
      letter-spacing: var(--lab-letter);
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      background: #0e0e0e;
      min-height: 180px;
      padding: 10px;
      white-space: pre;
      overflow: auto;
    }
    .log {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      max-height: 160px;
      overflow: auto;
      white-space: pre-wrap;
      color: #a9c8ff;
      background: #0f131a;
      border: 1px solid #253049;
      border-radius: 8px;
      padding: 8px;
    }
    .hint { font-size: 12px; color: #9a9a9a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <strong>Font Lab (Temporary)</strong>
      <div class="hint">Use this page to compare Thai rendering and IME behavior by device/browser.</div>
    </div>

    <div class="card controls">
      <label>
        Font Stack
        <select id="font-stack">
          <option value='"Noto Sans", "Noto Sans Thai", system-ui, sans-serif'>Noto Sans + Thai (Recommended)</option>
          <option value='"Noto Sans Mono", "Noto Sans Thai", ui-monospace, Menlo, monospace'>Noto Sans Mono + Thai</option>
          <option value='ui-monospace, Menlo, Monaco, monospace'>System Mono</option>
          <option value='system-ui, -apple-system, "Segoe UI", sans-serif'>System UI</option>
        </select>
      </label>
      <label>
        Font Size
        <input id="font-size" type="number" min="11" max="28" value="16">
      </label>
      <label>
        Line Height
        <input id="line-height" type="number" min="1" max="2.2" step="0.05" value="1.35">
      </label>
      <label>
        Letter Spacing (px)
        <input id="letter-spacing" type="number" min="-1" max="2" step="0.1" value="0">
      </label>
    </div>

    <div class="card">
      <label>
        Input Test (type Thai here)
        <textarea id="input-test" rows="3" placeholder="ลองพิมพ์ภาษาไทย + English + emoji"></textarea>
      </label>
      <div class="hint">IME events and key events will appear in the log below.</div>
    </div>

    <div class="card">
      <div>Preview</div>
      <div id="preview" class="lab"></div>
    </div>

    <div class="card">
      <div>Terminal-like Grid Sample</div>
      <div id="terminal-sample" class="mono"></div>
    </div>

    <div class="card">
      <div>Event Log</div>
      <div id="event-log" class="log"></div>
    </div>

    <div class="card">
      <button id="reset-btn" type="button">Reset</button>
      <button id="clear-log-btn" type="button">Clear Log</button>
      <a href="/" style="margin-left:10px;color:#9ec3ff;">Back to App</a>
    </div>
  </div>

  <script>
    const samples = [
      'ไทย: สวัสดีครับ วันนี้ทดสอบวรรณยุกต์ ก่า ก้า ก๊า ก๋า เกิ๊ด',
      'EN: The quick brown fox jumps over 1234567890.',
      'Mix: deploy แล้วลองรีเฟรชหน้าอีกครั้ง',
      'Emoji: 🙂 🚀 ✅ 🔧',
      '$ echo "ทดสอบการแสดงผลใน terminal"'
    ];

    const fontStack = document.getElementById('font-stack');
    const fontSize = document.getElementById('font-size');
    const lineHeight = document.getElementById('line-height');
    const letterSpacing = document.getElementById('letter-spacing');
    const inputTest = document.getElementById('input-test');
    const preview = document.getElementById('preview');
    const terminalSample = document.getElementById('terminal-sample');
    const eventLog = document.getElementById('event-log');
    const resetBtn = document.getElementById('reset-btn');
    const clearLogBtn = document.getElementById('clear-log-btn');

    function applyStyles() {
      document.documentElement.style.setProperty('--lab-font', fontStack.value);
      document.documentElement.style.setProperty('--lab-size', `${Number(fontSize.value || 16)}px`);
      document.documentElement.style.setProperty('--lab-line', String(Number(lineHeight.value || 1.35)));
      document.documentElement.style.setProperty('--lab-letter', `${Number(letterSpacing.value || 0)}px`);
    }

    function render() {
      const typed = inputTest.value.trim();
      preview.textContent = typed
        ? `${samples.join('\n')}\n\n---\nYou typed:\n${typed}`
        : samples.join('\n');
      terminalSample.textContent = [
        'lab@codewebway:~$ locale | egrep "LANG|LC_CTYPE"',
        'LANG=en_US.UTF-8',
        'LC_CTYPE=en_US.UTF-8',
        'lab@codewebway:~$ printf "%s\\n" "สวัสดีภาษาไทย"',
        'สวัสดีภาษาไทย',
        '',
        typed ? `lab@codewebway:~$ # typed => ${typed}` : ''
      ].join('\n');
    }

    function logLine(line) {
      const t = new Date().toISOString().slice(11, 23);
      eventLog.textContent = `[${t}] ${line}\n` + eventLog.textContent;
    }

    ['keydown', 'beforeinput', 'input', 'compositionstart', 'compositionupdate', 'compositionend']
      .forEach((evt) => {
        inputTest.addEventListener(evt, (e) => {
          const key = e.key || '';
          const data = e.data || '';
          logLine(`${evt} key="${key}" data="${data}" value="${inputTest.value}"`);
        });
      });

    [fontStack, fontSize, lineHeight, letterSpacing].forEach((el) => {
      el.addEventListener('input', () => {
        applyStyles();
        render();
      });
    });

    inputTest.addEventListener('input', render);
    resetBtn.addEventListener('click', () => {
      fontStack.selectedIndex = 0;
      fontSize.value = '16';
      lineHeight.value = '1.35';
      letterSpacing.value = '0';
      inputTest.value = '';
      applyStyles();
      render();
      logLine('reset');
    });
    clearLogBtn.addEventListener('click', () => { eventLog.textContent = ''; });

    applyStyles();
    render();
  </script>
</body>
</html>
